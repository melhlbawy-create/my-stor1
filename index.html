<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكبسولة التعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .info { background: #e8f0fe; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; }
        .subject { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <h3>🎓 الكبسولة التعليمية</h3>
    <div class="info">
        اهلا بك: <span id="user-name">طالب الكبسولة</span><br>
        رقم الطلب: <span id="order-ref" style="font-weight:bold; color:red;">A-000000</span>
    </div>
    
    <label>اختر المرحلة:</label>
    <select id="grade" onchange="updateRef()">
        <option value="ابتدائي">المرحلة الابتدائية (A)</option>
        <option value="إعدادي">المرحلة الإعدادية (B)</option>
        <option value="ثانوي">المرحلة الثانوية (C)</option>
    </select>

    <div id="list"></div>
    <div style="margin-top:15px; font-weight:bold;">الإجمالي: <span id="total">0</span> ج.م</div>
    <button onclick="send()">تأكيد وإرسال الطلب</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe?.user;
    if(user) document.getElementById('user-name').innerText = user.first_name;

    let randomNum = Math.floor(100000 + Math.random() * 900000);
    function updateRef() {
        let g = document.getElementById('grade').value;
        let prefix = (g === "ابتدائي") ? "A" : (g === "إعدادي" ? "B" : "C");
        document.getElementById('order-ref').innerText = prefix + "-" + randomNum;
    }
    updateRef();

    const subs = ["اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "العلوم", "الدراسات", "الحاسب الآلي"];
    let selected = [];
    subs.forEach(s => {
        let d = document.createElement('div');
        d.className = 'subject';
        d.innerHTML = `<label><input type="checkbox" onchange="check('${s}')"> ${s}</label> <span>20 ج</span>`;
        document.getElementById('list').appendChild(d);
    });

    function check(s) {
        if(selected.includes(s)) selected = selected.filter(x => x !== s);
        else selected.push(s);
        document.getElementById('total').innerText = selected.length * 20;
    }

    async function send() {
        if(selected.length === 0) return alert("اختر مادة");
        const fp = await FingerprintJS.load();
        const res = await fp.get();
        
        const orderData = {
            id: document.getElementById('order-ref').innerText,
            name: document.getElementById('user-name').innerText,
            grade: document.getElementById('grade').value,
            tg: user?.id || "N/A",
            items: selected.join(" - "),
            price: selected.length * 20,
            print: res.visitorId,
            time: new Date().toLocaleString('ar-EG')
        };

        fetch('https://script.google.com/macros/s/AKfycbzSamBCGq3ZF2RgP5ZeSct1ZusH_4F7Q7RkrOcI9pRLgxDDVz3W4fdaA8XqHlum3asu/exec', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(orderData)
        }).then(() => alert("تم الإرسال بنجاح يابطل!"));
    }
</script>
</body>
</html>
