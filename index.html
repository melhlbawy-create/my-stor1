<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الكبسولة التعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .user-info { background: #e8f4fd; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9em; }
        .subject-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: 0.3s; }
        .subject-item:hover { background: #f9f9f9; }
        .subject-item label { flex-grow: 1; cursor: pointer; }
        .price { color: #27ae60; font-weight: bold; margin-left: 10px; }
        .footer { margin-top: 25px; text-align: center; border-top: 2px solid #eee; padding-top: 15px; }
        #total-price { font-size: 1.2em; font-weight: bold; color: #e74c3c; }
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h2>الكبسولة التعليمية</h2>
    
    <div class="user-info">
        اهلا بك: <span id="user-name">طالب كبسولة</span><br>
        رقم الطلب: <span id="order-ref">...</span>
    </div>

    <div id="subjects-list">
        </div>

    <div class="footer">
        <div>الإجمالي: <span id="total-price">0</span> ج.م</div>
        <button onclick="processOrder()">تأكيد وطلب الآن</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('user-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
    }

    const orderRef = "CAP-" + Math.floor(Math.random() * 1000000);
    document.getElementById('order-ref').innerText = orderRef;

    const subjects = ["اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "العلوم", "الدراسات الاجتماعية", "الحاسب الآلي"];
    const itemPrice = 20;
    let selectedSubjects = [];

    const subjectsList = document.getElementById('subjects-list');
    subjects.forEach(sub => {
        const div = document.createElement('div');
        div.className = 'subject-item';
        div.innerHTML = `
            <label for="${sub}">${sub}</label>
            <span class="price">${itemPrice} ج</span>
            <input type="checkbox" id="${sub}" value="${sub}" onchange="toggleSubject('${sub}')">
        `;
        subjectsList.appendChild(div);
    });

    function toggleSubject(sub) {
        if (selectedSubjects.includes(sub)) {
            selectedSubjects = selectedSubjects.filter(item => item !== sub);
        } else {
            selectedSubjects.push(sub);
        }
        document.getElementById('total-price').innerText = selectedSubjects.length * itemPrice;
    }

    async function processOrder() {
        if (selectedSubjects.length === 0) {
            alert("من فضلك اختر مادة واحدة على الأقل");
            return;
        }

        alert("جاري إرسال طلبك للجدول... انتظر لحظة");

        // سحب بصمة الجهاز
        let visitorId = "Unknown";
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            visitorId = result.visitorId;
        } catch (e) { console.log("FP Error", e); }

        const orderData = {
            order_id: orderRef,
            student_name: document.getElementById('user-name').innerText,
            telegram_id: user?.id || "Unknown",
            subjects: selectedSubjects.join(" - "),
            total_amount: selectedSubjects.length * itemPrice,
            browser_fingerprint: visitorId,
            timestamp: new Date().toLocaleString('ar-EG')
        };

        const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbzSamBCGq3ZF2RgP5ZeSct1ZusH_4F7Q7RkrOcI9pRLgxDDVz3W4fdaA8XqHlum3asu/exec';

        fetch(googleScriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            body: JSON.stringify(orderData)
        }).then(() => {
            alert("تم إرسال طلبك بنجاح يا " + orderData.student_name + "\nرقم الطلب: " + orderRef + "\nسيتم التواصل معك فوراً.");
        }).catch(err => {
            alert("عذراً، حدث خطأ في الاتصال: " + err);
        });
    }
</script>

</body>
</html>
