<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كبسولة تعليمية</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f5f5f5;
}

.header {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}

.order {
  text-align: center;
  color: green;
  margin-bottom: 20px;
}

select, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

.subjects {
  margin-top: 10px;
}

.total {
  font-size: 18px;
  font-weight: bold;
  color: blue;
}
</style>
</head>

<body>

<div class="header">أهلاً بك فى: كبسولة تعليمية</div>
<div class="order" id="orderId"></div>

<select id="stage" onchange="loadGrades()">
<option value="">اختر المرحلة</option>
<option value="A">ابتدائي</option>
<option value="B">إعدادي</option>
<option value="C">ثانوي</option>
</select>

<select id="grade" onchange="loadSubjects()"></select>

<div class="subjects" id="subjects"></div>

<div class="total">الإجمالي: <span id="total">0</span> جنيه</div>

<button onclick="submitData()">إرسال الطلب</button>

<script>

const PRICE = 20;

// 🎯 توليد Order ID
function generateOrder(stage){
  const rand = Math.floor(100000 + Math.random() * 900000);
  return `Cap_${stage}${rand}`;
}

// 🎯 Device ID بسيط
function generateDeviceId(){
  const data = navigator.userAgent + screen.width + screen.height;
  return btoa(data);
}

// 🎯 الصفوف
const grades = {
  A: ["الثالث الابتدائي","الرابع الابتدائي","الخامس الابتدائي","السادس الابتدائي"],
  B: ["الأول الاعدادي","الثاني الاعدادي","الثالث الاعدادي"],
  C: ["الأول الثانوي","الثاني الثانوي","الثالث الثانوي"]
};

// 🎯 المواد
const subjectsData = {
  "الثالث الابتدائي": ["العربية","الانجليزية","الدين","الرياضيات"],
  "الرابع الابتدائي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب"],
  "الخامس الابتدائي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب"],
  "السادس الابتدائي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب"],

  "الأول الاعدادي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب","مهارات"],
  "الثاني الاعدادي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب","مهارات"],
  "الثالث الاعدادي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب"],

  "الأول الثانوي": ["العربية","الانجليزية","الدين","الدراسات","علوم متكاملة","الحاسب","فلسفة"],
  "الثاني الثانوي": ["العربية","الانجليزية","الدين","الدراسات","العلوم","الحاسب"],
  "الثالث الثانوي": ["العربية","القصة","الانجليزية","الدين","التاريخ","العلوم","الحاسب","رياضيات","فيزياء"]
};

// 🎯 تحميل الصفوف
function loadGrades(){
  const stage = document.getElementById("stage").value;
  const gradeSelect = document.getElementById("grade");

  gradeSelect.innerHTML = "";

  grades[stage].forEach(g=>{
    let opt = document.createElement("option");
    opt.value = g;
    opt.textContent = g;
    gradeSelect.appendChild(opt);
  });

  document.getElementById("orderId").innerText = generateOrder(stage);
}

// 🎯 تحميل المواد
function loadSubjects(){
  const grade = document.getElementById("grade").value;
  const container = document.getElementById("subjects");

  container.innerHTML = "";

  subjectsData[grade].forEach(sub=>{
    let div = document.createElement("div");
    div.innerHTML = `<input type="checkbox" value="${sub}" onchange="calc()"> ${sub}`;
    container.appendChild(div);
  });
}

// 🎯 حساب السعر
function calc(){
  const checks = document.querySelectorAll("input[type=checkbox]:checked");
  const total = checks.length * PRICE;
  document.getElementById("total").innerText = total;
}

// 🎯 إرسال البيانات
function submitData(){

  const tg = window.Telegram.WebApp;

  const user = tg.initDataUnsafe.user;

  const selected = [...document.querySelectorAll("input:checked")].map(e=>e.value);

  const data = {
    order_id: document.getElementById("orderId").innerText,
    telegram_id: user.id,
    name: user.first_name,
    stage: document.getElementById("stage").value,
    grade: document.getElementById("grade").value,
    subjects: selected,
    total: document.getElementById("total").innerText,
    device_id: generateDeviceId()
  };

  fetch("https://script.google.com/macros/s/AKfycbyGpOYqOvQE23XeLg16cw0k_8IALdUG--L9ZScyrzOwTYPMbmXkS4yYuDEdNtJVSpmz/exec", {
    method: "POST",
      headers: {
    "Content-Type": "application/json"
  },
    body: JSON.stringify(data)
  });
})
.then(res => res.text())
.then(res => console.log(res))
.catch(err => console.error(err));
  alert("تم إرسال الطلب");
}

</script>

</body>
</html>
