<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كبسولة تعليمية</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #ffffff10;
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  width: 350px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

.subject {
  padding: 10px;
  border-radius: 8px;
  margin: 5px 0;
  background: #ffffff20;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
}

.subject.active {
  border: 2px solid #00ffcc;
  box-shadow: 0 0 10px #00ffcc;
}

.total {
  text-align: center;
  margin: 10px;
  font-weight: bold;
}

button {
  background: #00c6ff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>أهلاً بك في: كبسولة تعليمية</h2>

<select id="stage" onchange="loadGrades()">
<option value="">اختر المرحلة</option>
<option value="A">ابتدائي</option>
<option value="B">إعدادي</option>
<option value="C">ثانوي</option>
</select>

<select id="grade" onchange="loadSubjects()">
<option value="">اختر الصف</option>
</select>

<div id="subjects"></div>

<div class="total">الإجمالي: <span id="total">0</span> جنيه</div>

<button onclick="submitData()">إرسال الطلب</button>

</div>

<script>
const PRICE = 20;
let selectedSubjects = [];

function loadGrades() {
  const stage = document.getElementById("stage").value;
  const grade = document.getElementById("grade");

  grade.innerHTML = "";

  const grades = {
    A: ["ثالث", "رابع", "خامس", "سادس"],
    B: ["أول", "ثاني", "ثالث"],
    C: ["أول", "ثاني", "ثالث"]
  };

  grades[stage].forEach(g => {
    const opt = document.createElement("option");
    opt.value = g;
    opt.textContent = g;
    grade.appendChild(opt);
  });
}

function loadSubjects() {
  const div = document.getElementById("subjects");
  div.innerHTML = "";
  selectedSubjects = [];

  const subjects = ["العربية","الإنجليزية","رياضيات","علوم","دراسات","حاسب"];

  subjects.forEach(sub => {
    const el = document.createElement("div");
    el.className = "subject";
    el.innerHTML = `📘 ${sub}`;

    el.onclick = () => {
      el.classList.toggle("active");

      if (selectedSubjects.includes(sub)) {
        selectedSubjects = selectedSubjects.filter(s => s !== sub);
      } else {
        selectedSubjects.push(sub);
      }

      document.getElementById("total").innerText = selectedSubjects.length * PRICE;
    };

    div.appendChild(el);
  });
}

function generateOrder() {
  return "Cap_" + Math.floor(Math.random()*1000000);
}

function generateDeviceId() {
  return localStorage.getItem("deviceId") || (function(){
    const id = "DEV_" + Math.random().toString(36).substr(2,9);
    localStorage.setItem("deviceId", id);
    return id;
  })();
}

function submitData() {

  const data = {
    order_id: generateOrder(),
    stage: document.getElementById("stage").value,
    grade: document.getElementById("grade").value,
    subjects: selectedSubjects,
    total: selectedSubjects.length * PRICE,
    device_id: generateDeviceId()
  };

  fetch("https://script.google.com/macros/s/AKfycbyYtmKuJUo8oYPQO2w7dvj0jSHYZfnu9fKF-PnTLoWhzp92wPML9yxVScuobpvG3egi/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
.then(res => {
  console.log(res);
  alert("تم الإرسال بنجاح");
})
  .then(res => {
    alert("تم الإرسال بنجاح");

    // 🔄 تصفير الفورم
    document.getElementById("stage").value = "";
    document.getElementById("grade").innerHTML = "";
    document.getElementById("subjects").innerHTML = "";
    document.getElementById("total").innerText = 0;
    selectedSubjects = [];
  })
  .catch(err => {
    alert("خطأ في الإرسال");
    console.log(err);
  });
}
</script>

</body>
</html>
