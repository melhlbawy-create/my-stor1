<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كبسولة تعليمية - طلب مواد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .info-box { background: #eef2ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .subject-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .subject-item:hover { background: #f9f9f9; }
        .btn-submit { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .total { text-align: center; font-weight: bold; font-size: 18px; margin-top: 15px; color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>الكبسولة التعليمية</h2></div>
    
    <div class="info-box">
        اهلا بك: <span id="user-name-display">زائر الكبسولة</span><br>
        رقم الطلب: <span id="order-id-display">...</span>
    </div>

    <label>اختر المرحلة الدراسية:</label>
    <select id="stage-select" style="width:100%; padding:10px; margin:10px 0;" onchange="generateOrderID()">
        <option value="ابتدائية">المرحلة الابتدائية</option>
        <option value="إعدادية">المرحلة الإعدادية</option>
        <option value="ثانوية">المرحلة الثانوية</option>
    </select>

    <div id="subjects-container">
        </div>

    <div class="total">الإجمالي: <span id="total-price">0</span> ج.م</div>
    <button class="btn-submit" onclick="sendToSheet()">تأكيد وإرسال الطلب</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const subjectsList = ["اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "العلوم", "الدراسات الاجتماعية", "الحاسب الآلي"];
    let selectedSubjects = [];
    const itemPrice = 20;

    // توليد رقم طلب ذكي بناءً على المرحلة
    function generateOrderID() {
        const stage = document.getElementById('stage-select').value;
        const prefix = stage === "ابتدائية" ? "A" : (stage === "إعدادية" ? "B" : "C");
        const randomNum = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('order-id-display').innerText = `${prefix}-${randomNum}`;
    }

    // بناء قائمة المواد
    function renderSubjects() {
        const container = document.getElementById('subjects-container');
        subjectsList.forEach(sub => {
            const div = document.createElement('div');
            div.className = 'subject-item';
            div.innerHTML = `<span>${sub}</span> <input type="checkbox" value="${sub}" onchange="updateSelection(this)">`;
            container.appendChild(div);
        });
    }

    function updateSelection(checkbox) {
        if (checkbox.checked) selectedSubjects.push(checkbox.value);
        else selectedSubjects = selectedSubjects.filter(s => s !== checkbox.value);
        document.getElementById('total-price').innerText = selectedSubjects.length * itemPrice;
    }

    async function sendToSheet() {
        if (selectedSubjects.length === 0) return alert("اختر مادة واحدة على الأقل");

        // سحب البصمة
        const fpLoad = await FingerprintJS.load();
        const fpResult = await fpLoad.get();

        const orderData = {
            order_id: document.getElementById('order-id-display').innerText,
            student_name: tg.initDataUnsafe.user?.first_name || "زائر الكبسولة",
            telegram_id: tg.initDataUnsafe.user?.id || "N/A",
            stage: document.getElementById('stage-select').value,
            grade: "عام", 
            subjects: selectedSubjects.join(" | "),
            count: selectedSubjects.length,
            total_amount: selectedSubjects.length * itemPrice,
            browser_fingerprint: fpResult.visitorId,
            timestamp: new Date().toLocaleString('ar-EG')
        };

        // الـ URL الخاص بـ Google Apps Script بعد الـ Deploy
        const scriptURL = 'ضع_رابط_السكريبت_الجديد_هنا';

        tg.MainButton.setText("جاري الإرسال..").show();

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(orderData)
        }).then(() => {
            alert("تم إرسال طلبك بنجاح يا " + orderData.student_name);
            tg.close();
        }).catch(err => alert("خطأ: " + err));
    }

    document.getElementById('user-name-display').innerText = tg.initDataUnsafe.user?.first_name || "زائر الكبسولة";
    renderSubjects();
    generateOrderID();
</script>
</body>
</html>
