<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كبسولة تعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; padding: 15px; margin: 0; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 15px; }
        .info-box { background: #334155; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; line-height: 1.6; }
        label { display: block; margin: 10px 0 5px; color: #94a3b8; font-size: 14px; }
        select, input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 15px; box-sizing: border-box; }
        .subjects-wrap { max-height: 180px; overflow-y: auto; background: #0f172a; padding: 8px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; }
        .subject-item { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #1e293b; }
        .subject-item:last-child { border-bottom: none; }
        .subject-item input { margin-left: 10px; width: auto; }
        .total-box { text-align: center; font-size: 18px; font-weight: bold; background: #0f172a; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        .status { text-align: center; font-size: 13px; margin-top: 8px; min-height: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 كبسولة تعليمية</h1>
        <div class="info-box">
            👤 الطالب: <span id="student-name">جاري التحميل...</span><br>
            🆔 معرف تليجرام: <span id="tg-id">...</span><br>
            📍 المحافظة: <span id="city-display">جاري التحديد...</span>
        </div>

        <label>المرحلة الدراسية:</label>
        <select id="stage" onchange="updateGrades()">
            <option value="">اختر المرحلة</option>
            <option value="المرحلة الابتدائية">المرحلة الابتدائية</option>
            <option value="المرحلة الإعدادية">المرحلة الإعدادية</option>
            <option value="المرحلة الثانوية">المرحلة الثانوية</option>
        </select>

        <label>الصف الدراسي:</label>
        <select id="grade" onchange="updateSubjects()">
            <option value="">اختر الصف أولاً</option>
        </select>

        <label>اختر المواد المطلوبة:</label>
        <div id="subjects-container" class="subjects-wrap">
            <p style="text-align:center; color:#64748b; padding:10px;">اختر المرحلة والصف لعرض المواد</p>
        </div>

        <div class="total-box"> الإجمالي: <span id="total-amount">0</span> ج.م</div>
        <button class="btn" id="submit-btn" onclick="submitOrder()" disabled>🚀 تأكيد وإرسال الطلب</button>
        <div class="status" id="status-msg"></div>
    </div>

    <script>
        // ================= تهيئة تليجرام ويب أب =================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let userData = { name: 'ضيف الكبسولة', id: 'unknown' };
        let userCity = 'غير معروف';
        let browserFingerprint = '';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyhwc-Erqqo4Wtl2smxSn0KRb1ijYYJVmRSpS9niipMCZwRdvRXAgN4ijSfyVp-kGkX/exec'; //https://script.google.com/macros/s/AKfycbwz3V-yVqhOZNHwUrgM0t0DJBAgkObJZVZun7ddRkmpcSxg9dnihriE6QPZnDSwNR8q/exec

        // ================= 1. جلب بيانات تليجرام =================
        function initTelegramUser() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                userData.name = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                userData.id = user.id.toString();
            }
            document.getElementById('student-name').textContent = userData.name;
            document.getElementById('tg-id').textContent = userData.id;
        }

        // ================= 2. كود جلب الموقع (محفوظ تماماً كما طلبت) =================
        function initLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) return resolve(userCity);
                navigator.geolocation.getCurrentPosition(async (position) => {
                    try {
                        const { latitude, longitude } = position.coords;
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ar`);
                        const data = await res.json();
                        userCity = data.address.city || data.address.town || data.address.village || data.address.state || 'غير معروف';
                        document.getElementById('city-display').textContent = userCity;
                        resolve(userCity);
                    } catch (e) {
                        document.getElementById('city-display').textContent = userCity;
                        resolve(userCity);
                    }
                }, () => {
                    document.getElementById('city-display').textContent = userCity;
                    resolve(userCity);
                }, { timeout: 6000, enableHighAccuracy: false });
            });
        }

        // ================= 3. كود جلب بصمة المتصفح (معزول ومستقل) =================
        function generateFingerprint() {
            return new Promise((resolve) => {
                try {
                    const props = [
                        navigator.userAgent,
                        navigator.language || navigator.userLanguage,
                        screen.colorDepth,
                        new Date().getTimezoneOffset(),
                        navigator.hardwareConcurrency || 0,
                        screen.width + 'x' + screen.height,
                        navigator.platform,
                        Intl.DateTimeFormat().resolvedOptions().timeZone,
                        navigator.maxTouchPoints || 0
                    ];
                    const str = props.join('||');
                    let h = 0;
                    for (let i = 0; i < str.length; i++) {
                        h = ((h << 5) - h) + str.charCodeAt(i);
                        h |= 0;
                    }
                    browserFingerprint = 'FP_' + Math.abs(h).toString(36).toUpperCase() + '_' + Date.now().toString(36);
                    resolve(browserFingerprint);
                } catch (err) {
                    browserFingerprint = 'FP_ERR_' + Date.now();
                    resolve(browserFingerprint);
                }
            });
        }

        // ================= 4. التهيئة المتوازية عند التحميل =================
        document.addEventListener('DOMContentLoaded', async () => {
            initTelegramUser();
            document.getElementById('status-msg').textContent = '⏳ جاري تجهيز النظام...';
            
            await Promise.all([
                initLocation(),
                generateFingerprint()
            ]);

            document.getElementById('status-msg').textContent = '✅ النظام جاهز. اختر المواد وأرسل الطلب.';
            checkFormValidity();
        });

        // ================= 5. منطق المواد والأسعار =================
        const subjectsDB = {
            'المرحلة الابتدائية': {
                'الصف الأول': [{name: 'لغة عربية', price: 20}, {name: 'رياضيات', price: 25}],
                'الصف السادس': [{name: 'لغة عربية', price: 30}, {name: 'علوم', price: 25}, {name: 'رياضيات', price: 30}]
            },
            'المرحلة الإعدادية': {
                'الصف الأول': [{name: 'رياضيات', price: 35}, {name: 'علوم', price: 30}],
                'الصف الثالث': [{name: 'رياضيات', price: 40}, {name: 'فيزياء', price: 35}, {name: 'كيمياء', price: 35}]
            },
            'المرحلة الثانوية': {
                'الصف الأول': [{name: 'رياضيات', price: 50}, {name: 'فيزياء', price: 45}],
                'الصف الثالث': [{name: 'رياضيات', price: 60}, {name: 'فيزياء', price: 55}, {name: 'كيمياء', price: 55}]
            }
        };

        function updateGrades() {
            const stage = document.getElementById('stage').value;
            const gradeSelect = document.getElementById('grade');
            gradeSelect.innerHTML = '<option value="">اختر الصف</option>';
            if (subjectsDB[stage]) {
                Object.keys(subjectsDB[stage]).forEach(g => {
                    gradeSelect.innerHTML += `<option value="${g}">${g}</option>`;
                });
            }
            updateSubjects();
        }

        function updateSubjects() {
            const stage = document.getElementById('stage').value;
            const grade = document.getElementById('grade').value;
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            if (subjectsDB[stage] && subjectsDB[stage][grade]) {
                subjectsDB[stage][grade].forEach((sub, idx) => {
                    container.innerHTML += `
                        <div class="subject-item">
                            <input type="checkbox" id="sub_${idx}" value="${sub.name}" data-price="${sub.price}" onchange="calcTotal()">
                            <label for="sub_${idx}" style="margin:0; flex:1; cursor:pointer;">${sub.name} (${sub.price} ج.م)</label>
                        </div>`;
                });
            } else {
                container.innerHTML = '<p style="text-align:center; color:#64748b; padding:10px;">اختر المرحلة والصف أولاً</p>';
            }
            calcTotal();
        }

        function calcTotal() {
            let total = 0;
            document.querySelectorAll('.subject-item input:checked').forEach(cb => {
                total += parseInt(cb.dataset.price);
            });
            document.getElementById('total-amount').textContent = total;
            checkFormValidity();
        }

        function checkFormValidity() {
            const stage = document.getElementById('stage').value;
            const grade = document.getElementById('grade').value;
            const checked = document.querySelectorAll('.subject-item input:checked').length;
            document.getElementById('submit-btn').disabled = !(stage && grade && checked > 0 && browserFingerprint && userCity !== 'جاري التحديد...');
        }

        // ================= 6. إرسال الطلب للخادم =================
        async function submitOrder() {
            if (!browserFingerprint) { alert('⏳ جاري تجهيز البصمة، انتظر لحظة...'); return; }
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري الإرسال...';
            document.getElementById('status-msg').textContent = '📡 يتم الاتصال بالخادم...';

            const selectedSubjects = [];
            document.querySelectorAll('.subject-item input:checked').forEach(cb => selectedSubjects.push(cb.value));
            const total = document.getElementById('total-amount').textContent;

            const payload = {
                order_id: 'CAP_' + Date.now().toString(36).toUpperCase(),
                student_name: userData.name,
                telegram_id: userData.id,
                city: userCity,
                stage: document.getElementById('stage').value,
                grade: document.getElementById('grade').value,
                subjects: selectedSubjects.join(' | '),
                total_amount: total,
                browser_fingerprint: browserFingerprint,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const resData = await response.json();
                    tg.showAlert('✅ تم استلام طلبك بنجاح!\nسيتم توجيهك لبوابة الدفع.');
                    setTimeout(() => tg.close(), 2000);
                } else {
                    throw new Error('فشل الاتصال بالخادم');
                }
            } catch (err) {
                alert('❌ حدث خطأ أثناء الإرسال. تأكد من الإنترنت وحاول مرة أخرى.');
                btn.disabled = false;
                btn.textContent = '🚀 تأكيد وإرسال الطلب';
            }
        }
    </script>
</body>
</html>
