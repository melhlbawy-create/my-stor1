<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كبسولة تعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blue: #1e3a8a; /* أزرق ملكي أخف */
            --bright-white: #ffffff;
            --electric-blue: #3b82f6;
            --success-glow: #22c55e;
            --orange-alert: #f97316;
        }

        body {
            background: var(--bg-blue);
            background-image: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }

        .main-card {
            background: var(--bright-white);
            border-radius: 20px;
            width: 100%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden; position: relative;
        }

        header {
            background: var(--bright-white);
            padding: 20px; text-align: center;
            border-bottom: 3px solid var(--electric-blue);
        }

        header h1 { color: var(--electric-blue); margin: 0; font-size: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .form-body { padding: 20px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--bg-blue); font-weight: bold; }

        select {
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0;
            background: #f8fafc; color: var(--electric-blue); font-weight: bold; outline: none;
        }

        .subjects-grid { display: grid; gap: 10px; margin-top: 15px; }
        .sub-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; border-radius: 12px; background: #f1f5f9;
            border: 2px solid transparent; cursor: pointer; transition: 0.3s;
        }

        .sub-item i { color: var(--electric-blue); font-size: 1.2em; width: 30px; }
        .sub-item span { flex-grow: 1; color: var(--bg-blue); font-weight: 500; }

        .sub-item.selected {
            border-color: var(--success-glow);
            background: #f0fdf4; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
        }

        .check-circle {
            width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .selected .check-circle { background: var(--success-glow); border-color: var(--success-glow); color: white; }
        .selected .check-circle::after { content: "✔"; font-size: 12px; }

        .footer-action {
            padding: 20px; background: #f8fafc; border-top: 1px solid #e2e8f0;
            text-align: center;
        }

        .total-glow {
            font-size: 1.4em; color: var(--success-glow); font-weight: bold;
            text-shadow: 0 0 5px rgba(34,197,94,0.3); margin-bottom: 10px;
        }

        .btn-confirm {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--electric-blue); color: white; font-size: 1.2em;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* صفحة الشكر */
        #thank-you-overlay {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 85%;
            background: var(--bright-white); border-radius: 20px;
            padding: 30px; text-align: center; z-index: 100;
            border: 3px solid var(--electric-blue); box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #thank-you-overlay h2 { color: var(--electric-blue); margin-bottom: 10px; }
        #thank-you-overlay p { color: var(--orange-alert); font-weight: bold; font-size: 18px; }
        .btn-reset {
            background: var(--bg-blue); color: white; padding: 10px 30px;
            border-radius: 10px; border: none; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <header>
        <h1>كبسولة تعليمية</h1>
    </header>

    <div class="form-body" id="form-content">
        <div class="input-group">
            <label>المرحلة الدراسية:</label>
            <select id="stage" onchange="updateGrades()">
                <option value="ابتدائي">المرحلة الابتدائية</option>
                <option value="إعدادي">المرحلة الإعدادية</option>
                <option value="ثانوي">المرحلة الثانوية</option>
            </select>
        </div>

        <div class="input-group">
            <label>الصف الدراسي:</label>
            <select id="grade"></select>
        </div>

        <label style="color: var(--bg-blue); font-weight: bold;">اختر المواد:</label>
        <div class="subjects-grid" id="subjects-list"></div>
    </div>

    <div class="footer-action">
        <div class="total-glow">الإجمالي: <span id="total-price">0</span> ج.م</div>
        <button class="btn-confirm" onclick="submitOrder()">تأكيد الطلب</button>
    </div>

    <div id="thank-you-overlay">
        <h2>شكراً لثقتك بـ "كبسولة تعليمية"</h2>
        <p>تم إرسال طلبك بنجاح! جاري توجيهك لإتمام الدفع...</p>
        <button class="btn-reset" onclick="resetApp()">موافق</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const stages = {
        "ابتدائي": ["الثالث", "الرابع", "الخامس", "السادس"],
        "إعدادي": ["الأول الإعدادي", "الثاني الإعدادي", "الثالث الإعدادي"],
        "ثانوي": ["الأول الثانوي", "الثاني الثانوي", "الثالث الثانوي"]
    };

    const subsData = [
        { n: "اللغة العربية", i: "fa-book" },
        { n: "اللغة الإنجليزية", i: "fa-language" },
        { n: "الرياضيات", i: "fa-calculator" },
        { n: "العلوم", i: "fa-microscope" },
        { n: "الدراسات", i: "fa-earth-americas" },
        { n: "حاسب آلي", i: "fa-laptop" },
        { n: "تربية دينية", i: "fa-kaaba" },
        { n: "مهارات فنية", i: "fa-paint-brush" }
    ];

    let selected = [];

    function updateGrades() {
        const s = document.getElementById('stage').value;
        const gSelect = document.getElementById('grade');
        gSelect.innerHTML = stages[s].map(g => `<option value="${g}">${g}</option>`).join('');
    }

    function initSubjects() {
        const list = document.getElementById('subjects-list');
        subsData.forEach(sub => {
            const div = document.createElement('div');
            div.className = 'sub-item';
            div.innerHTML = `<i class="fa-solid ${sub.i}"></i><span>${sub.n}</span><div class="check-circle"></div>`;
            div.onclick = () => {
                div.classList.toggle('selected');
                if(selected.includes(sub.n)) selected = selected.filter(x => x !== sub.n);
                else selected.push(sub.n);
                document.getElementById('total-price').innerText = selected.length * 20;
            };
            list.appendChild(div);
        });
    }

    async function submitOrder() {
        if(selected.length === 0) return alert("اختر مادة أولاً");
        
        const fp = await FingerprintJS.load();
        const res = await fp.get();
        
        const orderData = {
            order_id: "CAP-" + Math.floor(Math.random()*1000000),
            name: (tg.initDataUnsafe.user?.first_name || "Guest") + " " + (tg.initDataUnsafe.user?.last_name || ""),
            tg_id: tg.initDataUnsafe.user?.id || "N/A",
            stage: document.getElementById('stage').value,
            grade: document.getElementById('grade').value,
            subjects: selected.join(" | "),
            total: selected.length * 20,
            fingerprint: res.visitorId,
            time: new Date().toLocaleString('ar-EG')
        };

        fetch('https://script.google.com/macros/s/AKfycbzSamBCGq3ZF2RgP5ZeSct1ZusH_4F7Q7RkrOcI9pRLgxDDVz3W4fdaA8XqHlum3asu/exec', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(orderData)
        }).then(() => {
            document.getElementById('thank-you-overlay').style.display = 'block';
        });
    }

    function resetApp() {
        location.reload();
    }

    updateGrades();
    initSubjects();
</script>
</body>
</html>
