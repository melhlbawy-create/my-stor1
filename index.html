<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>كبسولة تعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://openfpcdn.io/fingerprintjs/v3/iife.min.js"></script>
    <style>
        :root { --tg-theme-bg-color: #ffffff; --tg-theme-text-color: #222222; --main-orange: #f39c12; --dark-orange: #d68910; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 12px; box-sizing: border-box; }
        .header-container { background: linear-gradient(145deg, #1a1a1a, #333333); border-radius: 12px; padding: 15px; text-align: center; border: 2px solid var(--main-orange); margin-bottom: 15px; }
        .header-title { color: var(--main-orange); font-size: 24px; margin: 0; }
        .location-greeting { background: #e8f6f3; border: 1px solid #1abc9c; border-radius: 8px; padding: 10px; text-align: center; font-weight: bold; color: #0e6251; margin-bottom: 15px; }
        .ref-id-container { background-color: #f8f9fa; border-right: 4px solid #3498db; border-radius: 6px; padding: 10px; font-family: monospace; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .select-container { margin-bottom: 15px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #bdc3c7; font-size: 15px; font-weight: bold; }
        .subjects-container { display: none; background: #fff; border-radius: 8px; padding: 12px; border: 1px solid #eee; margin-bottom: 15px; }
        .subject-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f1f1; }
        .payment-methods { display: none; background: #fdf2e9; border-radius: 8px; padding: 12px; border: 1px solid #f39c12; margin-bottom: 15px; }
        .total-container { background-color: #2ecc71; color: white; padding: 12px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .submit-btn { background: linear-gradient(145deg, var(--main-orange), var(--dark-orange)); color: white; border: none; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .loader { display: none; text-align: center; font-weight: bold; color: var(--main-orange); }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="header-title">كبسولة تعليمية</h1>
    </div>

    <div id="greetingLocation" class="location-greeting">أهلاً بك يا بطل في كبسولة تعليمية</div>
    <div class="ref-id-container" id="orderIdDisplay">جاري إنشاء رقم الطلب...</div>

    <div class="select-container">
        <select id="stageSelect" onchange="updateGrades()">
            <option value="" disabled selected>حدد مرحلتك التعليمية</option>
            <option value="A">المرحلة الابتدائية</option>
            <option value="B">المرحلة الإعدادية</option>
            <option value="C">المرحلة الثانوية</option>
        </select>
    </div>

    <div class="select-container" id="gradeContainer" style="display: none;">
        <select id="gradeSelect" onchange="updateSubjects()">
            <option value="" disabled selected>حدد صفك الدراسي</option>
        </select>
    </div>

    <div class="subjects-container" id="subjectsContainer">
        <h3 style="margin:0; font-size:16px; color:var(--dark-orange);">اختر المواد:</h3>
        <div id="subjectsList"></div>
    </div>

    <div class="payment-methods" id="paymentMethodsContainer">
        <h3 style="margin:0; font-size:16px; color:var(--dark-orange);">وسيلة الدفع:</h3>
        <select id="paymentMethodSelect">
            <option value="5648069">فوري ⚡</option>
            <option value="5648063">المحافظ الإلكترونية 📱</option>
            <option value="5647161">البطاقة البنكية 💳</option>
        </select>
    </div>

    <div class="total-container" id="totalAmountDisplay">المطلوب: 0 ج</div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">إرسال الطلب والدفع</button>
    <div id="loader" class="loader">جاري المعالجة...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // استبدل هذا الرابط برابط الـ Deploy الجديد الخاص بك
        const GOOGLE_SCRIPT_URL = "رابط_جوجل_سكريبت_الجديد_هنا";

        let studentData = {
            telegramId: tg.initDataUnsafe?.user?.id || "User",
            telegramName: tg.initDataUnsafe?.user?.first_name || "Guest",
            fingerprint: "", orderId: "", totalAmount: 0, selectedSubjects: []
        };

        const educationalData = {
            "A": { name: "الابتدائية", grades: { "الصف الثالث الابتدائي": ["اللغة العربية", "رياضيات"] }},
            "C": { name: "الثانوية", grades: { "الصف الثالث الثانوي": ["تجميع اسئلة للاحياء", "الفلسفة", "الفيزياء"] }}
        };

        FingerprintJS.load().then(fp => fp.get()).then(res => { studentData.fingerprint = res.visitorId; });

        function updateGrades() {
            const stage = document.getElementById('stageSelect').value;
            const gradeSelect = document.getElementById('gradeSelect');
            gradeSelect.innerHTML = '<option value="" disabled selected>حدد صفك</option>';
            document.getElementById('gradeContainer').style.display = 'block';
            Object.keys(educationalData[stage].grades).forEach(g => {
                let opt = document.createElement('option'); opt.value = g; opt.innerHTML = g; gradeSelect.appendChild(opt);
            });
            studentData.orderId = `Cap_${stage}${Date.now().toString().slice(-6)}`;
            document.getElementById('orderIdDisplay').innerText = studentData.orderId;
        }

        function updateSubjects() {
            const stage = document.getElementById('stageSelect').value;
            const grade = document.getElementById('gradeSelect').value;
            const list = document.getElementById('subjectsList');
            list.innerHTML = '';
            document.getElementById('subjectsContainer').style.display = 'block';
            document.getElementById('paymentMethodsContainer').style.display = 'block';
            educationalData[stage].grades[grade].forEach(s => {
                let div = document.createElement('div');
                div.className = 'subject-item';
                div.innerHTML = `<label>${s}</label><input type="checkbox" value="${s}" onchange="calculateTotal()">`;
                list.appendChild(div);
            });
        }

        function calculateTotal() {
            const boxes = document.querySelectorAll('#subjectsList input:checked');
            studentData.selectedSubjects = Array.from(boxes).map(cb => cb.value);
            studentData.totalAmount = studentData.selectedSubjects.length * 20;
            document.getElementById('totalAmountDisplay').innerText = `المطلوب: ${studentData.totalAmount} ج`;
        }

        async function submitOrder() {
            if (studentData.selectedSubjects.length === 0) return tg.showAlert("اختر مادة واحدة على الأقل");
            
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const payload = {
                request_type: "جديد",
                order_id: studentData.orderId,
                telegram_name: studentData.telegramName,
                telegram_id: studentData.telegramId,
                stage: educationalData[document.getElementById('stageSelect').value].name,
                grade: document.getElementById('gradeSelect').value,
                subjects: studentData.selectedSubjects.join(' - '),
                total_amount: studentData.totalAmount,
                fingerprint: studentData.fingerprint,
                integration_id: document.getElementById('paymentMethodSelect').value
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success") {
                    tg.openLink(result.payment_url);
                    tg.close();
                } else { throw new Error(result.message); }
            } catch (e) {
                tg.showAlert("حدث خطأ في الاتصال: " + e.message);
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
