<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الكبسولة التعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .user-info { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 20px; border-right: 5px solid #1a73e8; font-size: 0.95em; }
        .selection-group { margin-bottom: 20px; }
        .selection-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-size: 1em; outline: none; }
        .subject-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .subject-item:last-child { border-bottom: none; }
        .price { color: #28a745; font-weight: bold; }
        .footer { margin-top: 30px; text-align: center; background: #fff; padding-top: 20px; border-top: 2px dashed #eee; }
        #total-price { font-size: 1.4em; font-weight: bold; color: #d93025; }
        button { background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 6px rgba(26,115,232,0.3); transition: 0.2s; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>الكبسولة التعليمية</h2>
    
    <div class="user-info">
        <b>الطالب:</b> <span id="user-name">زائر الكبسولة</span><br>
        <b>رقم الطلب:</b> <span id="order-ref">...</span>
    </div>

    <div class="selection-group">
        <label>اختر المرحلة الدراسية:</label>
        <select id="grade-level">
            <option value="ابتدائي">المرحلة الابتدائية</option>
            <option value="إعدادي">المرحلة الإعدادية</option>
            <option value="ثانوي">المرحلة الثانوية</option>
        </select>
    </div>

    <div class="selection-group">
        <label>اختر المواد المطلوبة:</label>
        <div id="subjects-list"></div>
    </div>

    <div class="footer">
        <div>إجمالي المبلغ: <span id="total-price">0</span> ج.م</div>
        <button onclick="processOrder()">تأكيد وإرسال الطلب</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('user-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
    }

    const orderRef = "CAP-" + Math.floor(100000 + Math.random() * 900000);
    document.getElementById('order-ref').innerText = orderRef;

    const subjects = ["اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "العلوم", "الدراسات", "الحاسب الآلي"];
    const itemPrice = 20;
    let selectedSubjects = [];

    const listDiv = document.getElementById('subjects-list');
    subjects.forEach(sub => {
        const d = document.createElement('div');
        d.className = 'subject-item';
        d.innerHTML = `
            <label><input type="checkbox" onchange="toggle('${sub}')"> ${sub}</label>
            <span class="price">${itemPrice} ج</span>
        `;
        listDiv.appendChild(d);
    });

    function toggle(sub) {
        if (selectedSubjects.includes(sub)) selectedSubjects = selectedSubjects.filter(i => i !== sub);
        else selectedSubjects.push(sub);
        document.getElementById('total-price').innerText = selectedSubjects.length * itemPrice;
    }

    async function processOrder() {
        if (selectedSubjects.length === 0) {
            alert("برجاء اختيار مادة واحدة على الأقل");
            return;
        }

        alert("جاري تسجيل طلبك في النظام...");

        let vId = "غير معروف";
        try {
            const fp = await FingerprintJS.load();
            const res = await fp.get();
            vId = res.visitorId;
        } catch(e) {}

        const data = {
            order_id: orderRef,
            student_name: document.getElementById('user-name').innerText,
            grade_level: document.getElementById('grade-level').value,
            telegram_id: user?.id || "N/A",
            subjects: selectedSubjects.join(" - "),
            total_amount: selectedSubjects.length * itemPrice,
            fingerprint: vId,
            date: new Date().toLocaleString('ar-EG')
        };

        const url = 'https://script.google.com/macros/s/AKfycbzSamBCGq3ZF2RgP5ZeSct1ZusH_4F7Q7RkrOcI9pRLgxDDVz3W4fdaA8XqHlum3asu/exec';

        fetch(url, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            alert("تم الإرسال بنجاح يا " + data.student_name + "\nرقم طلبك هو: " + orderRef);
        }).catch(e => alert("حدث خطأ: " + e));
    }
</script>
</body>
</html>
