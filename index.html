<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الكبسولة التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://openfpcdn.io/fingerprintjs/v4"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-active { border: 2px solid #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="p-4">

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-800">كبسولة تعليمية 🎓</h1>
        <p class="text-gray-600 text-sm">اختر موادك وحمل كبسولتك فوراً</p>
    </div>

    <div id="student-info" class="bg-white p-3 rounded-lg shadow-sm mb-4 text-sm border-r-4 border-blue-500">
        <p>مرحباً: <span id="user-name" class="font-bold">جاري التحميل...</span></p>
        <p>رقم الطلب: <span id="order-ref" class="text-blue-600 font-mono"></span></p>
    </div>

    <div class="mb-4">
        <label class="block font-bold mb-2 text-gray-700">المرحلة الدراسية:</label>
        <select id="level" class="w-full p-2 rounded-lg border shadow-sm" onchange="updateClasses()">
            <option value="">اختر المرحلة</option>
            <option value="primary">ابتدائية</option>
            <option value="middle">إعدادية</option>
            <option value="secondary">ثانوية</option>
        </select>
    </div>

    <div id="subjects-container" class="grid grid-cols-2 gap-3 mb-20">
        </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-lg border-t flex justify-between items-center">
        <div>
            <p class="text-xs text-gray-500">الإجمالي:</p>
            <p class="text-xl font-bold text-green-600"><span id="total-price">0</span> ج.م</p>
        </div>
        <button onclick="processOrder()" id="pay-btn" class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold shadow-md active:scale-95 transition-all">
            تأكيد وطلب
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // فتح الميني آب بكامل الشاشة

        let selectedSubjects = [];
        const itemPrice = 20;

        // 1. توليد رقم مرجعي وتاريخ وتوقيت
        const orderRef = "CAP-" + Math.floor(Math.random() * 1000000);
        document.getElementById('order-ref').innerText = orderRef;

        // 2. جلب بيانات التليجرام
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
        }

        // 3. قاعدة بيانات المواد البسيطة
        const database = {
            primary: ["لغة عربية", "رياضيات", "علوم", "دراسات"],
            middle: ["جبر", "هندسة", "إنجليزي", "علوم"],
            secondary: ["فيزياء", "كيمياء", "أحياء", "فلسفة"]
        };

        function updateClasses() {
            const level = document.getElementById('level').value;
            const container = document.getElementById('subjects-container');
            container.innerHTML = "";
            selectedSubjects = [];
            updateTotal();

            if(database[level]) {
                database[level].forEach(sub => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-xl shadow-sm text-center border-2 border-transparent cursor-pointer transition-all";
                    div.innerHTML = `<p class="font-bold">${sub}</p><p class="text-blue-500 text-sm">20 ج</p>`;
                    div.onclick = function() {
                        this.classList.toggle('card-active');
                        if(selectedSubjects.includes(sub)) {
                            selectedSubjects = selectedSubjects.filter(i => i !== sub);
                        } else {
                            selectedSubjects.push(sub);
                        }
                        updateTotal();
                    };
                    container.appendChild(div);
                });
            }
        }

        function updateTotal() {
            const total = selectedSubjects.length * itemPrice;
            document.getElementById('total-price').innerText = total;
        }

    async function processOrder() {
            if(selectedSubjects.length === 0) {
                alert("من فضلك اختر مادة واحدة على الأقل");
                return;
            }

            // سحب بصمة الجهاز
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            const visitorId = result.visitorId;

            // تجميع البيانات النهائية
            const orderData = {
                order_id: orderRef,
                student_name: document.getElementById('user-name').innerText,
                telegram_id: user?.id || "Unknown",
                subjects: selectedSubjects.join(" - "),
                total_amount: selectedSubjects.length * itemPrice,
                browser_fingerprint: visitorId,
                timestamp: new Date().toLocaleString('ar-EG'),
                device_info: navigator.userAgent
            };

            console.log("البيانات الجاهزة للإرسال:", orderData);
            
            // إرسال البيانات الفعلية لجوجل شيت
            fetch('https://script.google.com/macros/s/AKfycbyiUgX2Gw6tF8KcXf7jzkp37p8-kuan8Ga70kzr4qhV28G3xXQiOwR0OCBgPZi01zbb/exec', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(orderData)
            }).then(() => {
                alert("تم إرسال طلبك بنجاح يا " + orderData.student_name + "\nرقم الطلب: " + orderRef);
            });
        }
    </script>
</body>
</html>
