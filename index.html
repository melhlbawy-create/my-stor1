<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>كبسولة تعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://openfpcdn.io/fingerprintjs/v3/iife.min.js"></script>
    
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --main-orange: #f39c12;
            --dark-orange: #d68910;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 12px; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .header-container {
            background: linear-gradient(145deg, #1a1a1a, #333333);
            border-radius: 12px; padding: 15px; text-align: center;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.2);
            border: 2px solid var(--main-orange); margin-bottom: 15px;
        }

        .header-title {
            color: var(--main-orange); font-size: 24px; margin: 0;
            text-shadow: 0 0 5px rgba(243, 156, 18, 0.5);
        }

        .location-greeting {
            background: #e8f6f3; border: 1px solid #1abc9c;
            border-radius: 8px; padding: 10px; text-align: center;
            font-weight: bold; color: #0e6251; margin-bottom: 15px; font-size: 14px;
        }

        .ref-id-container {
            background-color: #f8f9fa; border-right: 4px solid #3498db;
            border-radius: 6px; padding: 10px; font-family: monospace;
            font-size: 16px; font-weight: bold; color: #2c3e50;
            text-align: center; margin-bottom: 15px;
        }

        .select-container { margin-bottom: 15px; }

        select {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 2px solid #bdc3c7; font-size: 15px; font-weight: bold;
            background-color: #fff; color: #2c3e50; outline: none;
        }

        .subjects-container {
            display: none; background: #fff; border-radius: 8px;
            padding: 12px; border: 1px solid #eee; margin-bottom: 15px;
        }

        .subject-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid #f1f1f1;
        }

        .subject-item label { flex-grow: 1; font-weight: 600; cursor: pointer; }

        input[type="checkbox"] { width: 22px; height: 22px; accent-color: #e74c3c; }

        .payment-methods {
            display: none; background: #fdf2e9; border-radius: 8px;
            padding: 12px; border: 1px solid #f39c12; margin-bottom: 15px;
        }

        .total-container {
            background-color: #2ecc71; color: white; padding: 12px;
            border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold;
            margin-bottom: 15px;
        }

        .submit-btn {
            background: linear-gradient(145deg, var(--main-orange), var(--dark-orange));
            color: white; border: none; width: 100%; padding: 15px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }

        .loader { display: none; text-align: center; font-weight: bold; color: var(--main-orange); }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="header-title">كبسولة تعليمية</h1>
    </div>

    <div id="greetingLocation" class="location-greeting">أهلاً بك يا بطل في كبسولة تعليمية</div>

    <div class="ref-id-container" id="orderIdDisplay">جاري إنشاء رقم الطلب...</div>

    <!-- 1. اختيار المرحلة -->
    <div class="select-container">
        <select id="stageSelect" onchange="updateGrades()">
            <option value="" disabled selected>حدد مرحلتك التعليمية</option>
            <option value="A">المرحلة الابتدائية</option>
            <option value="B">المرحلة الإعدادية</option>
            <option value="C">المرحلة الثانوية</option>
        </select>
    </div>

    <!-- 2. اختيار الصف -->
    <div class="select-container" id="gradeContainer" style="display: none;">
        <select id="gradeSelect" onchange="updateSubjects()">
            <option value="" disabled selected>حدد صفك الدراسي</option>
        </select>
    </div>

    <!-- 3. قائمة المواد -->
    <div class="subjects-container" id="subjectsContainer">
        <h3 style="margin:0 0 10px 0; font-size:16px; color:var(--dark-orange);">اختر المواد الدراسية:</h3>
        <div id="subjectsList"></div>
    </div>

    <!-- 4. وسيلة الدفع -->
    <div class="payment-methods" id="paymentMethodsContainer">
        <h3 style="margin:0 0 10px 0; font-size:16px; color:var(--dark-orange);">اختر وسيلة الدفع:</h3>
        <select id="paymentMethodSelect">
            <option value="5648069">فوري (الأكثر طلباً) ⚡</option>
            <option value="5648063">المحافظ الإلكترونية (فودافون كاش...) 📱</option>
            <option value="5647161">البطاقة البنكية (فيزا / ماستر كارد) 💳</option>
        </select>
    </div>

    <div class="total-container" id="totalAmountDisplay">المطلوب دفعه: 0 ج</div>

    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">إرسال الطلب والدفع</button>
    <div id="loader" class="loader">جاري تجهيز فاتورتك...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // الرابط الخاص بك (تأكد من تحديثه بعد نشر السكريبت)
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXVPjirDu3LUqxYq6JW1IRFZnhHBwfWfXoFd_KTRaprjamrQLEutb-POjZ9IouEzso/exec";

        let studentData = {
            telegramId: tg.initDataUnsafe?.user?.id || "Dev_User",
            telegramName: tg.initDataUnsafe?.user?.first_name || "Guest",
            fingerprint: "",
            location: "مصر",
            orderId: "",
            totalAmount: 0,
            selectedSubjects: []
        };

        const SUBJECT_PRICE = 20;

        // --- مصفوفة البيانات (سهلة التعديل كما طلبت) ---
        const educationalData = {
            "A": { name: "الابتدائية", grades: {
                "الصف الثالث الابتدائي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "رياضيات"],
                "الصف الرابع الابتدائي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي"],
                "الصف الخامس الابتدائي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي"],
                "الصف السادس الابتدائي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي"]
            }},
            "B": { name: "الإعدادية", grades: {
                "الصف الأول الإعدادي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي", "مهارات صناعية"],
                "الصف الثاني الإعدادي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي", "مهارات صناعية"],
                "الصف الثالث الإعدادي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي"]
            }},
            "C": { name: "الثانوية", grades: {
                "الصف الأول الثانوي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم المتكاملة", "الحاسب الآلي"],
                "الصف الثاني الثانوي": ["اللغة العربية", "التربية الدينية", "اللغة الإنجليزية", "الدراسات", "العلوم", "الحاسب الآلي"],
                "الصف الثالث الثانوي": ["اللغة العربية", "القصة", "التربية الدينية", "اللغة الإنجليزية", "تجميع اسئلة للاحياء", "الفلسفة", "الدراسات", "الفيزياء", "الحاسب الآلي"]
            }}
        };

        // بصمة الجهاز وحساب الموقع
        FingerprintJS.load().then(fp => fp.get()).then(result => { studentData.fingerprint = result.visitorId; });
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            if(data.region) {
                studentData.location = data.region;
                document.getElementById('greetingLocation').innerText = `💪 أهلاً بطل ${data.region} في كبسولة تعليمية`;
            }
        });

        function updateGrades() {
            const stage = document.getElementById('stageSelect').value;
            const gradeSelect = document.getElementById('gradeSelect');
            gradeSelect.innerHTML = '<option value="" disabled selected>حدد صفك الدراسي</option>';
            document.getElementById('subjectsContainer').style.display = 'none';
            document.getElementById('gradeContainer').style.display = 'block';
            
            Object.keys(educationalData[stage].grades).forEach(grade => {
                let opt = document.createElement('option');
                opt.value = grade; opt.innerHTML = grade;
                gradeSelect.appendChild(opt);
            });
            generateOrderId(stage);
        }

        function generateOrderId(stageCode) {
            const randomNum = Math.floor(100000 + Math.random() * 900000);
            studentData.orderId = `Cap_${stageCode}${randomNum}`;
            document.getElementById('orderIdDisplay').innerText = studentData.orderId;
        }

        function updateSubjects() {
            const stage = document.getElementById('stageSelect').value;
            const grade = document.getElementById('gradeSelect').value;
            const list = document.getElementById('subjectsList');
            list.innerHTML = '';
            document.getElementById('subjectsContainer').style.display = 'block';
            document.getElementById('paymentMethodsContainer').style.display = 'block';

            educationalData[stage].grades[grade].forEach(subject => {
                let div = document.createElement('div');
                div.className = 'subject-item';
                div.innerHTML = `<label>${subject}</label><input type="checkbox" value="${subject}" onchange="calculateTotal()">`;
                list.appendChild(div);
            });
            calculateTotal();
        }

        function calculateTotal() {
            const boxes = document.querySelectorAll('#subjectsList input:checked');
            studentData.selectedSubjects = Array.from(boxes).map(cb => cb.value);
            studentData.totalAmount = studentData.selectedSubjects.length * SUBJECT_PRICE;
            document.getElementById('totalAmountDisplay').innerText = `المطلوب دفعه: ${studentData.totalAmount} ج`;
        }

        // الدالة المعدلة للربط مع جوجل سكريبت وفتح الدفع
        async function submitOrder() {
            const stage = document.getElementById('stageSelect').value;
            const grade = document.getElementById('gradeSelect').value;
            const selectedIntId = document.getElementById('paymentMethodSelect').value;

            if (!stage || !grade || studentData.selectedSubjects.length === 0) {
                tg.showAlert("برجاء اختيار المرحلة والصف ومادة واحدة على الأقل");
                return;
            }

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const payload = {
                request_type: "جديد",
                order_id: studentData.orderId,
                telegram_name: studentData.telegramName,
                telegram_id: studentData.telegramId,
                stage: educationalData[stage].name,
                grade: grade,
                location: studentData.location,
                subjects: studentData.selectedSubjects.join(' - '),
                total_amount: studentData.totalAmount,
                fingerprint: studentData.fingerprint,
                integration_id: selectedIntId
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "success" && result.payment_url) {
                    tg.showConfirm("تم تجهيز طلبك. هل تريد الانتقال لصفحة الدفع الآن؟", (ok) => {
                        if (ok) {
                            tg.openLink(result.payment_url);
                            tg.close();
                        } else {
                            document.getElementById('submitBtn').style.display = 'block';
                            document.getElementById('loader').style.display = 'none';
                        }
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                tg.showAlert("عذراً، حدث خطأ: " + error.message);
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
