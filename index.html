<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كبسولة تعليمية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid #667eea; }
        .header h1 { color: #667eea; font-size: 2em; margin-bottom: 10px; }
        
        /* ========== تنسيق تحية المحافظة ========== */
        .greeting-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            display: none;
            animation: fadeIn 0.5s ease-in;
        }
        
        .greeting-box.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ========== مؤشر التحميل ========== */
        .location-loading {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            color: #667eea;
            font-weight: bold;
        }
        /* =========================================== */
        
        .student-info { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .student-info p { margin: 5px 0; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
        select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        select:focus { outline: none; border-color: #667eea; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        .subject-checkbox { display: flex; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        .subject-checkbox:hover { background: #e9ecef; }
        .subject-checkbox input[type="checkbox"] { margin-left: 8px; width: 18px; height: 18px; cursor: pointer; }
        .subject-checkbox label { margin: 0; cursor: pointer; font-weight: normal; }
        .total { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; margin: 20px 0; font-size: 1.5em; font-weight: bold; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:active { transform: translateY(0); }
        .success-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .success-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; }
        .success-content h2 { color: #28a745; margin-bottom: 15px; }
        .success-content p { margin: 10px 0; color: #666; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>كبسولة تعليمية</h1>
        </div>
        
        <!-- ========== مؤشر تحديد الموقع ========== -->
        <div id="locationLoading" class="location-loading">
            📍 جاري تحديد موقعك تلقائياً...
        </div>
        <!-- =========================================== -->
        
        <!-- ========== صندوق تحية المحافظة ========== -->
        <div id="greetingBox" class="greeting-box"></div>
        <!-- =========================================== -->
        
        <div class="student-info">
            <p id="studentName">الطالب: جاري التحميل..</p>
            <p id="orderCodeDisplay">الكود: ...</p>
            <p id="cityDisplay" style="color: #667eea; display: none;">📍 المدينة: <span id="cityName"></span></p>
        </div>
        
        <form id="orderForm">
            <div class="form-group">
                <label>المرحلة الدراسية:</label>
                <select id="stage" required>
                    <option value="">اختر المرحلة</option>
                    <option value="المرحلة الابتدائية">المرحلة الابتدائية</option>
                    <option value="المرحلة الإعدادية">المرحلة الإعدادية</option>
                    <option value="المرحلة الثانوية">المرحلة الثانوية</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>الصف الدراسي:</label>
                <select id="grade" required>
                    <option value="">اختر الصف أولاً</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>اختر المواد المطلوبة:</label>
                <div id="subjectsContainer" class="subjects-grid">
                    <!-- سيتم توليد المواد تلقائياً هنا -->
                </div>
            </div>
            
            <div class="total">
                الإجمالي: <span id="totalAmount">0</span> ج.م
            </div>
            
            <button type="submit" class="submit-btn">🚀 تأكيد وإرسال الطلب</button>
        </form>
    </div>
    
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <h2>شكراً لثقتك بنا</h2>
            <p>تم إرسال طلبك بنجاح لـ "كبسولة تعليمية"</p>
            <p>جاري توجيهك الآن..</p>
            <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 30px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">موافق</button>
        </div>
    </div>

    <script>
        // ==================== 🔧 إعدادات قابلة للتعديل بسهولة ====================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-wxn9jdPG_HlXDGh3g4a76GlmbyXwOaEmD6zjRkMIQR7GaUMGG36YIc2Qih8yqLXF/exec';
        
        // 💰 سعر المادة الواحدة (غيّر الرقم هنا فقط لو تغير السعر مستقبلاً)
        const PRICE_PER_SUBJECT = 20; 

        // 🔤 حرف المرحلة للكود
        const STAGE_PREFIX = {
            'المرحلة الابتدائية': 'a',
            'المرحلة الإعدادية': 'b',
            'المرحلة الثانوية': 'c'
        };

        // 📚 الصفوف المتاحة لكل مرحلة
        const GRADES_BY_STAGE = {
            'المرحلة الابتدائية': ['الثالث الابتدائي', 'الرابع الابتدائي', 'الخامس الابتدائي', 'السادس الابتدائي'],
            'المرحلة الإعدادية': ['الأول الإعدادي', 'الثاني الإعدادي', 'الثالث الإعدادي'],
            'المرحلة الثانوية': ['الأول الثانوي', 'الثاني الثانوي', 'الثالث الثانوي']
        };

        // 📖 المواد المتاحة لكل صف (لتعديل المواد مستقبلاً: عدّل هذا الكائن فقط)
        const SUBJECTS_BY_GRADE = {
            'الثالث الابتدائي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الرياضيات'],
            'الرابع الابتدائي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الدراسات', 'العلوم', 'الحاسب الآلي'],
            'الخامس الابتدائي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الدراسات', 'العلوم', 'الحاسب الآلي'],
            'السادس الابتدائي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الدراسات', 'العلوم', 'الحاسب الآلي'],
            'الأول الإعدادي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الدراسات', 'العلوم', 'الحاسب الآلي', 'مهارات الصناعة'],
            'الثاني الإعدادي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الدراسات', 'العلوم', 'الحاسب الآلي', 'مهارات الصناعة'],
            'الثالث الإعدادي': ['اللغة الإنجليزية', 'التربية الدينية', 'اللغة العربية', 'الدراسات', 'العلوم', 'الحاسب الآلي', 'مهارات الصناعة'],
            'الأول الثانوي': ['اللغة الإنجليزية', 'اللغة العربية', 'التربية الدينية', 'العلوم المتكاملة', 'الحاسب الآلي'],
            'الثاني الثانوي': ['اللغة الإنجليزية', 'اللغة العربية', 'التربية الدينية', 'العلوم المتكاملة', 'الحاسب الآلي'],
            'الثالث الثانوي': ['اللغة الإنجليزية', 'اللغة العربية', 'الفلسفة', 'الفيزياء', 'التربية الدينية', 'الحاسب الآلي', 'التاريخ']
        };

        // ️ خريطة التحايا للمحافظات
        const CITY_GREETINGS = {
            'Cairo': '🕌 القاهرة: منور يا بطل في العاصمة، بلاد القلعة وشارع المعز!',
            'Giza': '🔺 الجيزة: أهلاً بيك في أرض الأهرامات وأبوالهول ومدينة الإنتاج!',
            'Alexandria': '🗼 الإسكندرية: عروس البحر المتوسط.. منورنا في بلاد المكتبة وقايتباي!',
            'Qalyubia': '⚙️ القليوبية: تحية لأهل بنها والقناطر الخيرية وبلاد الموالح!',
            'Monufia': '🕯️ المنوفية: أهلاً بيك وبأهل العلم والكرم، بلاد القطن والذرة!',
            'Sharqia': '🐎 الشرقية: منور يا بطل في أرض الخيول العربية وتل بسطة!',
            'Gharbia': '🧵 الغربية: تحية لقلعة الغزل والنسيج في المحلة ومنورين أهل طنطا!',
            'Dakahlia': '🏛️ الدقهلية: أهلاً بيك في عاصمة الطب، ومنورين كل أهل المنصورة!',
            'Beheira': '🌾 البحيرة: تحية لأهل الكرم وزراعة القطن وأكبر مضارب الأرز!',
            'Kafr El Sheikh': '🛶 كفر الشيخ: منور يا بطل في بلاد السمك والأرز وبركة غليون!',
            'Damietta': '⛵ دمياط: أهلاً بيك وبأهل الصناعة والحلويات والسفن الجدعان!',
            'Port Said': '🚢 بورسعيد: تحية لأهل الباسلة والسمسمية والمنطقة الحرة!',
            'Ismailia': '🥭 الإسماعيلية: منور يا بطل في بلاد المانجو والفطير المشلتت!',
            'Suez': '⚓ السويس: تحية لأبطال الغريب وبلاد الزيتون والمأكولات البحرية!',
            'Faiyum': '⚙️ الفيوم: أهلاً بيك في بلاد وادي الريان وبحيرة قارون والسياحة البيئية!',
            'Beni Suef': '🧱 بني سويف: تحية لأهل هرم ميدوم وصناع الكيماويات الشطار!',
            'Minya': '👸 المنيا: أهلاً بيك في عروس الصعيد وبلاد تل العمارنة وبني حسن!',
            'Assiut': '🦅 أسيوط: تحية لقلعة الصناعة والتعليم في قلب الصعيد!',
            'Sohag': '⛪ سوهاج: أهلاً بيك وبأهل المنسوجات اليدوية والآثار القبطية العريقة!',
            'Qena': '🏺 قنا: تحية لأهل معبد دندرة وبلاد العسل الأسود الجدعان!',
            'Luxor': '🗿 الأقصر: منور يا بطل في بلد ثلث آثار العالم والكرنك ووادي الملوك!',
            'Aswan': '🌊 أسوان: أهلاً بيك وبأهل النوبة والسد العالي ومعبد أبو سمبل!',
            'Matrouh': '🏖️ مطروح: أهلاً بيك في عجيبة وكليوباترا وبلاد التمور والزيتون!',
            'North Sinai': '🌴 شمال سيناء: تحية لأهل العريش والمنتجات البدوية وأشجار الزيتون!',
            'South Sinai': '⛰️ جنوب سيناء: منور يا بطل في شرم الشيخ وجبل موسى وسانت كاترين!',
            'Red Sea': '🤿 البحر الأحمر: أهلاً بيك في الغردقة وبلاد الغوص والتعدين!',
            'New Valley': '🏜️ الوادي الجديد: تحية لأكبر محافظاتنا مساحة، بلاد التمور وواحة سيوة!'
        };

        // ==================== المتغيرات العامة ====================
        let studentData = { name: '', telegramId: '' };
        let currentOrderCode = '';
        let detectedCity = ''; // 🏙️ المدينة المكتشفة تلقائياً
        let detectedRegion = ''; // المنطقة/المحافظة

        // ==================== عند تحميل الصفحة ====================
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            studentData.name = urlParams.get('name') || 'ضيف الكبسولة';
            studentData.telegramId = urlParams.get('telegram') || '';
            
            document.getElementById('studentName').textContent = 'الطالب: ' + studentData.name;
            
            // 🏙️ جلب موقع الطالب تلقائياً
            detectUserLocation();
            
            // ربط الأحداث
            document.getElementById('stage').addEventListener('change', handleStageChange);
            document.getElementById('grade').addEventListener('change', handleGradeChange);
            document.getElementById('orderForm').addEventListener('submit', submitForm);
        });

        // ==================== 🌍 دالة تحديد موقع المستخدم تلقائياً ====================
        async function detectUserLocation() {
            try {
                // استخدام ipapi.co API (مجاني - لا يحتاج API Key للاستخدام المحدود)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.error) {
                    throw new Error('Failed to get location');
                }
                
                // استخراج البيانات
                detectedCity = data.city || 'غير معروف';
                detectedRegion = data.region || data.region_code || 'غير معروف';
                const country = data.country_name || 'مصر';
                
                // عرض المدينة في الصفحة
                document.getElementById('cityName').textContent = `${detectedCity} (${detectedRegion})`;
                document.getElementById('cityDisplay').style.display = 'block';
                
                // إخفاء مؤشر التحميل
                document.getElementById('locationLoading').style.display = 'none';
                
                // عرض التحية المخصصة
                displayGreeting(detectedRegion);
                
                console.log('📍 Location detected:', {
                    city: detectedCity,
                    region: detectedRegion,
                    country: country
                });
                
            } catch (error) {
                console.error('Error detecting location:', error);
                
                // في حالة الفشل، نستخدم بيانات افتراضية
                detectedCity = 'غير معروف';
                detectedRegion = 'غير معروف';
                
                document.getElementById('cityName').textContent = 'تعذر تحديد الموقع';
                document.getElementById('cityDisplay').style.display = 'block';
                document.getElementById('locationLoading').style.display = 'none';
                document.getElementById('locationLoading').textContent = '⚠️ تعذر تحديد موقعك تلقائياً';
                document.getElementById('locationLoading').style.color = '#f5576c';
            }
        }

        // ==================== 🏛️ دالة عرض تحية المحافظة ====================
        function displayGreeting(region) {
            let greetingText = CITY_GREETINGS[region] || 
                `✨ أهلاً بك يا بطل من ${region} في الكبسولة التعليمية!`;
            
            const greetingBox = document.getElementById('greetingBox');
            greetingBox.innerText = greetingText;
            greetingBox.classList.add('show');
        }
        // ======================================================================

        // ==================== عند تغيير المرحلة ====================
        function handleStageChange(e) {
            const stage = e.target.value;
            const gradeSelect = document.getElementById('grade');
            const subjectsContainer = document.getElementById('subjectsContainer');
            
            // تفريغ القوائم
            gradeSelect.innerHTML = '<option value="">اختر الصف</option>';
            subjectsContainer.innerHTML = '';
            document.getElementById('totalAmount').textContent = '0';
            
            if (stage && GRADES_BY_STAGE[stage]) {
                // ملء قائمة الصفوف
                GRADES_BY_STAGE[stage].forEach(grade => {
                    const opt = document.createElement('option');
                    opt.value = grade;
                    opt.textContent = grade;
                    gradeSelect.appendChild(opt);
                });
                
                // توليد كود جديد
                generateOrderCode(stage);
            } else {
                document.getElementById('orderCodeDisplay').textContent = 'الكود: ...';
                currentOrderCode = '';
            }
        }

        // ==================== عند تغيير الصف ====================
        function handleGradeChange(e) {
            const grade = e.target.value;
            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';
            document.getElementById('totalAmount').textContent = '0';
            
            if (grade && SUBJECTS_BY_GRADE[grade]) {
                SUBJECTS_BY_GRADE[grade].forEach((subj, index) => {
                    const id = `subj_${index}`;
                    const div = document.createElement('div');
                    div.className = 'subject-checkbox';
                    div.innerHTML = `
                        <input type="checkbox" id="${id}" name="subject" value="${subj}" onchange="calculateTotal()">
                        <label for="${id}">${subj}</label>
                    `;
                    container.appendChild(div);
                });
            }
        }

        // ==================== توليد كود الطلب ====================
        function generateOrderCode(stage) {
            const prefix = STAGE_PREFIX[stage] || 'x';
            const randomNum = Math.floor(100000 + Math.random() * 900000);
            currentOrderCode = `CAP_${prefix}${randomNum}`;
            document.getElementById('orderCodeDisplay').textContent = 'الكود: ' + currentOrderCode;
        }

        // ==================== حساب الإجمالي ====================
        function calculateTotal() {
            const checked = document.querySelectorAll('input[name="subject"]:checked').length;
            document.getElementById('totalAmount').textContent = checked * PRICE_PER_SUBJECT;
        }

        // ==================== إرسال النموذج ====================
        function submitForm(e) {
            e.preventDefault();
            
            const stage = document.getElementById('stage').value;
            const grade = document.getElementById('grade').value;
            const subjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            
            if (!stage || !grade || subjects.length === 0) {
                alert('الرجاء استكمال اختيار المرحلة والصف ومادة واحدة على الأقل');
                return;
            }
            
            // تجهيز البيانات للإرسال
            const formData = {
                order_id: currentOrderCode,
                student_name: studentData.name,
                telegram_id: studentData.telegramId,
                city: detectedCity,        // 🏙️ المدينة المكتشفة تلقائياً
                region: detectedRegion,    // 🏙️ المنطقة/المحافظة
                stage: stage,
                grade: grade,
                subjects: subjects.join(' | '),
                count: subjects.length,
                total_amount: document.getElementById('totalAmount').textContent,
                browser_fingerprint: btoa(navigator.userAgent + '|' + new Date().getTime()),
                timestamp: new Date().toISOString()
            };
            
            console.log('📤 البيانات المرسلة:', formData);
            
            const btn = document.querySelector('.submit-btn');
            btn.innerHTML = '<span class="loading"></span> جاري الإرسال...';
            btn.disabled = true;
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                btn.innerHTML = '✓ تم الإرسال بنجاح';
                document.getElementById('successModal').style.display = 'flex';
                setTimeout(() => {
                    btn.innerHTML = '🚀 تأكيد وإرسال الطلب';
                    btn.disabled = false;
                    document.getElementById('orderForm').reset();
                    document.getElementById('subjectsContainer').innerHTML = '';
                    document.getElementById('grade').innerHTML = '<option value="">اختر الصف أولاً</option>';
                    document.getElementById('orderCodeDisplay').textContent = 'الكود: ...';
                    document.getElementById('totalAmount').textContent = '0';
                    document.getElementById('greetingBox').classList.remove('show');
                    document.getElementById('cityDisplay').style.display = 'none';
                    document.getElementById('locationLoading').style.display = 'block';
                    document.getElementById('locationLoading').textContent = '📍 جاري تحديد موقعك تلقائياً...';
                    document.getElementById('locationLoading').style.color = '#667eea';
                    currentOrderCode = '';
                    detectedCity = '';
                    detectedRegion = '';
                }, 3000);
            })
            .catch(err => {
                alert('حدث خطأ. حاول مرة أخرى.');
                btn.innerHTML = ' تأكيد وإرسال الطلب';
                btn.disabled = false;
            });
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }
    </script>
</body>
</html>
