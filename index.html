<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كبسولة تعليمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .student-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .student-info p {
            margin: 5px 0;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .subject-checkbox {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .subject-checkbox:hover {
            background: #e9ecef;
        }
        
        .subject-checkbox input[type="checkbox"] {
            margin-left: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .subject-checkbox label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }
        
        .total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .success-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        
        .success-content h2 {
            color: #28a745;
            margin-bottom: 15px;
        }
        
        .success-content p {
            margin: 10px 0;
            color: #666;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>كبسولة تعليمية</h1>
        </div>
        
        <div class="student-info">
            <p id="studentName">الطالب: جاري التحميل..</p>
            <p id="studentCode">الكود: ...</p>
        </div>
        
        <form id="orderForm">
            <div class="form-group">
                <label>المرحلة الدراسية:</label>
                <select id="stage" required>
                    <option value="">اختر المرحلة</option>
                    <option value="المرحلة الابتدائية">المرحلة الابتدائية</option>
                    <option value="المرحلة الإعدادية">المرحلة الإعدادية</option>
                    <option value="المرحلة الثانوية">المرحلة الثانوية</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>الصف الدراسي:</label>
                <select id="grade" required>
                    <option value="">اختر الصف</option>
                    <option value="الأول الابتدائي">الأول الابتدائي</option>
                    <option value="الثاني الابتدائي">الثاني الابتدائي</option>
                    <option value="الثالث الابتدائي">الثالث الابتدائي</option>
                    <option value="الرابع الابتدائي">الرابع الابتدائي</option>
                    <option value="الخامس الابتدائي">الخامس الابتدائي</option>
                    <option value="السادس الابتدائي">السادس الابتدائي</option>
                    <option value="الأول الإعدادي">الأول الإعدادي</option>
                    <option value="الثاني الإعدادي">الثاني الإعدادي</option>
                    <option value="الثالث الإعدادي">الثالث الإعدادي</option>
                    <option value="الأول الثانوي">الأول الثانوي</option>
                    <option value="الثاني الثانوي">الثاني الثانوي</option>
                    <option value="الثالث الثانوي">الثالث الثانوي</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>اختر المواد المطلوبة:</label>
                <div class="subjects-grid">
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj1" name="subject" value="اللغة العربية" data-price="50">
                        <label for="subj1">اللغة العربية</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj2" name="subject" value="اللغة الإنجليزية" data-price="50">
                        <label for="subj2">اللغة الإنجليزية</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj3" name="subject" value="الرياضيات" data-price="50">
                        <label for="subj3">الرياضيات</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj4" name="subject" value="العلوم" data-price="50">
                        <label for="subj4">العلوم</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj5" name="subject" value="الدراسات" data-price="50">
                        <label for="subj5">الدراسات</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj6" name="subject" value="حاسب آلي" data-price="50">
                        <label for="subj6">حاسب آلي</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj7" name="subject" value="تربية دينية" data-price="50">
                        <label for="subj7">تربية دينية</label>
                    </div>
                    <div class="subject-checkbox">
                        <input type="checkbox" id="subj8" name="subject" value="مهارات فنية" data-price="50">
                        <label for="subj8">مهارات فنية</label>
                    </div>
                </div>
            </div>
            
            <div class="total">
                الإجمالي: <span id="totalAmount">0</span> ج.م
            </div>
            
            <button type="submit" class="submit-btn">🚀 تأكيد وإرسال الطلب</button>
        </form>
    </div>
    
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <h2>شكراً لثقتك بنا</h2>
            <p>تم إرسال طلبك بنجاح لـ "كبسولة تعليمية"</p>
            <p>جاري توجيهك الآن..</p>
            <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 30px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">موافق</button>
        </div>
    </div>

    <script>
        // ==================== ملاحظات مهمة ====================
        // 1. ضع رابط Google Apps Script الخاص بك هنا
        // 2. تأكد من نشر السكربت كـ Web App
        // 3. اضبط الصلاحيات على "Anyone"
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6pso3B3tT5QIdywkndyPmjdBdtt7ZIX48iOeoUwgUAiHgq38Ecj9BN2Q1iha2TDqz/exec';
        
        // ==================== المتغيرات العامة ====================
        let studentData = {
            name: '',
            code: '',
            telegramId: ''
        };
        
        const SUBJECT_PRICE = 50; // سعر المادة الواحدة
        
        // ==================== عند تحميل الصفحة ====================
        window.addEventListener('DOMContentLoaded', function() {
            // محاولة جلب بيانات الطالب من URL Parameters
            const urlParams = new URLSearchParams(window.location.search);
            studentData.name = urlParams.get('name') || 'ضيف الكبسولة';
            studentData.code = urlParams.get('code') || generateOrderCode();
            studentData.telegramId = urlParams.get('telegram') || '';
            
            // عرض بيانات الطالب
            document.getElementById('studentName').textContent = 'الطالب: ' + studentData.name;
            document.getElementById('studentCode').textContent = 'الكود: ' + studentData.code;
            
            // إضافة مستمعي الأحداث
            setupEventListeners();
        });
        
        // ==================== إعداد مستمعي الأحداث ====================
        function setupEventListeners() {
            // حساب الإجمالي عند تغيير أي checkbox
            const checkboxes = document.querySelectorAll('input[name="subject"]');
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', calculateTotal);
            });
            
            // إرسال النموذج
            document.getElementById('orderForm').addEventListener('submit', submitForm);
        }
        
        // ==================== حساب الإجمالي ====================
        function calculateTotal() {
            const checkboxes = document.querySelectorAll('input[name="subject"]:checked');
            const total = checkboxes.length * SUBJECT_PRICE;
            document.getElementById('totalAmount').textContent = total;
        }
        
        // ==================== توليد كود الطلب ====================
        function generateOrderCode() {
            const prefix = String.fromCharCode(65 + Math.floor(Math.random() * 26));
            const number = Math.floor(100000 + Math.random() * 900000);
            return prefix + '-' + number;
        }
        
        // ==================== إرسال النموذج ====================
        function submitForm(e) {
            e.preventDefault();
            
            // ==================== جمع البيانات ====================
            // 1. جمع المواد المختارة
            const selectedSubjects = [];
            const checkboxes = document.querySelectorAll('input[name="subject"]:checked');
            
            checkboxes.forEach(checkbox => {
                selectedSubjects.push(checkbox.value);
            });
            
            // التحقق من اختيار مواد
            if (selectedSubjects.length === 0) {
                alert('الرجاء اختيار مادة واحدة على الأقل');
                return;
            }
            
            // 2. تجهيز البيانات للإرسال
            const formData = {
                order_id: studentData.code,                    // كود الطلب
                student_name: studentData.name,                 // اسم الطالب
                telegram_id: studentData.telegramId,            // معرف تيليجرام
                stage: document.getElementById('stage').value,  // المرحلة
                grade: document.getElementById('grade').value,  // الصف
                subjects: selectedSubjects.join(' | '),         // المواد (مفصولة بـ |)
                count: selectedSubjects.length,                 // عدد المواد
                total_amount: document.getElementById('totalAmount').textContent, // الإجمالي
                browser_fingerprint: getBrowserFingerprint(),   // بصمة المتصفح
                timestamp: new Date().toISOString()             // الوقت
            };
            
            // ==================== عرض البيانات للتأكد (للتجربة) ====================
            console.log('البيانات المرסלה:', formData);
            
            // 3. إرسال البيانات إلى Google Apps Script
            const submitBtn = document.querySelector('.submit-btn');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> جاري الإرسال...';
            submitBtn.disabled = true;
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // مهم جداً لتجنب مشاكل CORS
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(() => {
                // نجاح الإرسال
                submitBtn.innerHTML = '✓ تم الإرسال بنجاح';
                document.getElementById('successModal').style.display = 'flex';
                
                // إعادة تعيين الزر بعد 3 ثواني
                setTimeout(() => {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                }, 3000);
                
                // إعادة تعيين النموذج
                document.getElementById('orderForm').reset();
                document.getElementById('totalAmount').textContent = '0';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('حدث خطأ أثناء الإرسال. الرجاء المحاولة مرة أخرى.');
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            });
        }
        
        // ==================== الحصول على بصمة المتصفح ====================
        function getBrowserFingerprint() {
            const userAgent = navigator.userAgent;
            const language = navigator.language;
            const platform = navigator.platform;
            const screenResolution = screen.width + 'x' + screen.height;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            return btoa(userAgent + '|' + language + '|' + platform + '|' + screenResolution + '|' + timezone);
        }
        
        // ==================== إغلاق النافذة المنبثقة ====================
        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            // يمكن إضافة توجيه لصفحة أخرى هنا
            // window.location.href = 'https://example.com';
        }
    </script>
</body>
</html>
