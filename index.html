<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كبسولة تعليمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #e0e0e0; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #0f3460; margin-bottom: 20px; font-size: 24px; }
        .info-box { background: #0f3460; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: right; }
        .info-box span { color: #e94560; font-weight: bold; }
        select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-size: 16px; }
        select { background: #533483; color: white; }
        button { background: #e94560; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { background: #c72c41; }
        .subjects-list { text-align: right; background: #0f3460; padding: 10px; border-radius: 8px; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        .subject-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #533483; }
        .subject-item:last-child { border-bottom: none; }
        .total-price { font-size: 20px; color: #4cd137; font-weight: bold; margin: 15px 0; }
        .status { color: #f1c40f; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 كبسولة تعليمية</h1>
    
    <div class="status" id="locationStatus">📍 جاري تحديد محافظتك...</div>

    <div class="info-box">
        👤 الطالب: <span id="studentName">جاري التحميل...</span><br>
        🆔 المعرف: <span id="userId">...</span>
    </div>

    <label>المرحلة الدراسية:</label>
    <select id="stageSelect" onchange="updateGrades()">
        <option value="">اختر المرحلة</option>
        <option value="primary">المرحلة الابتدائية</option>
        <option value="prep">المرحلة الإعدادية</option>
        <option value="secondary">المرحلة الثانوية</option>
    </select>

    <label>الصف الدراسي:</label>
    <select id="gradeSelect" onchange="updateSubjects()" disabled>
        <option value="">اختر الصف</option>
    </select>

    <div id="subjectsContainer" class="subjects-list" style="display:none;">
        <!-- المواد ستظهر هنا -->
    </div>

    <div class="total-price">الإجمالي: <span id="totalAmount">0</span> جنيه</div>
    <button onclick="sendOrder()" id="submitBtn">🚀 تأكيد الطلب</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // المتغيرات العامة
    let userCity = 'غير معروف'; // القيمة الافتراضية حتى يتم التحديد
    let fingerprint = '';
    
    // قاعدة بيانات المواد والأسعار (يمكنك تعديل الأسعار هنا)
    const subjectsDatabase = {
        primary: {
            grade1: [{name: 'لغة عربية', price: 20}, {name: 'رياضيات', price: 20}],
            grade6: [{name: 'علوم', price: 30}, {name: 'دراسات', price: 30}]
        },
        prep: {
            grade1: [{name: 'رياضيات', price: 40}, {name: 'علوم', price: 40}],
            grade3: [{name: 'فيزياء', price: 50}, {name: 'كيمياء', price: 50}]
        },
        secondary: {
            grade1: [{name: 'رياضيات', price: 60}, {name: 'فيزياء', price: 60}],
            grade3: [{name: 'تفاضل', price: 70}, {name: 'استاتيكا', price: 70}]
        }
    };

    // 1. تهيئة التطبيق وجلب البيانات
    window.onload = function() {
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('studentName').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('userId').innerText = tg.initDataUnsafe.user.id;
        }
        
        // تشغيل الموقع والبصمة في نفس الوقت
        getUserLocation();
        generateFingerprint();
    };

    // ---------------------------------------------------------
    // 2. كود جلب الموقع (تمت إضافته بدقة)
    // ---------------------------------------------------------
    function getUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // استخدام API مجاني لتحويل الإحداثيات لاسم مدينة/محافظة
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ar`)
                    .then(response => response.json())
                    .then(data => {
                        if(data.address && data.address.governorate) {
                            userCity = data.address.governorate;
                        } else if (data.address && data.address.city) {
                            userCity = data.address.city;
                        } else {
                            userCity = data.display_name.split(',')[0];
                        }
                        document.getElementById('locationStatus').innerText = '✅ تم تحديد: ' + userCity;
                        document.getElementById('locationStatus').style.color = '#4cd137';
                    })
                    .catch(() => {
                        document.getElementById('locationStatus').innerText = '⚠️ تعذر تحديد الموقع بدقة';
                    });
            }, () => {
                document.getElementById('locationStatus').innerText = '⚠️ يرجى تفعيل الموقع';
            });
        }
    }

    // ---------------------------------------------------------
    // 3. كود البصمة (محفوظ تماماً كما هو - لم يمسسه أحد)
    // ---------------------------------------------------------
    function generateFingerprint() {
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125,1,62,20);
            ctx.fillStyle = "#069";
            ctx.fillText("Fingerprint", 2, 15);
            ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
            ctx.fillText("Fingerprint", 4, 17);
            
            const b64 = canvas.toDataURL().replace("data:image/png;base64,","");
            
            // دمج بيانات الكانفاس مع بيانات الجهاز
            const hardwareData = [
                navigator.userAgent,
                screen.width + "x" + screen.height,
                new Date().getTimezoneOffset(),
                !!window.sessionStorage,
                !!window.localStorage
            ].join("###");
            
            // توليد الهاش البسيط (للاستخدام كـ ID فريد)
            let hash = 0;
            const str = b64 + hardwareData;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            fingerprint = 'CAP-' + Math.abs(hash).toString(16).toUpperCase();
            console.log("Fingerprint Generated:", fingerprint);
        } catch (e) {
            fingerprint = 'CAP-ERROR';
        }
    }

    // ---------------------------------------------------------
    // 4. منطق واجهة المستخدم
    // ---------------------------------------------------------
    function updateGrades() {
        const stage = document.getElementById('stageSelect').value;
        const gradeSelect = document.getElementById('gradeSelect');
        gradeSelect.innerHTML = '<option value="">اختر الصف</option>';
        
        if (stage && subjectsDatabase[stage]) {
            gradeSelect.disabled = false;
            for (let gradeKey in subjectsDatabase[stage]) {
                let gradeName = gradeKey === 'grade1' ? 'الصف الأول' : 
                                gradeKey === 'grade3' ? 'الصف الثالث' : 
                                gradeKey === 'grade6' ? 'الصف السادس' : gradeKey;
                let option = document.createElement('option');
                option.value = gradeKey;
                option.innerText = gradeName;
                gradeSelect.appendChild(option);
            }
        } else {
            gradeSelect.disabled = true;
            document.getElementById('subjectsContainer').style.display = 'none';
        }
        updateSubjects();
    }

    function updateSubjects() {
        const stage = document.getElementById('stageSelect').value;
        const grade = document.getElementById('gradeSelect').value;
        const container = document.getElementById('subjectsContainer');
        container.innerHTML = '';
        
        if (stage && grade && subjectsDatabase[stage][grade]) {
            container.style.display = 'block';
            subjectsDatabase[stage][grade].forEach((sub, index) => {
                const div = document.createElement('div');
                div.className = 'subject-item';
                div.innerHTML = `
                    <label><input type="checkbox" class="sub-check" value="${sub.name}" data-price="${sub.price}" onchange="calcTotal()"> ${sub.name}</label>
                    <span>${sub.price} ج.م</span>
                `;
                container.appendChild(div);
            });
        } else {
            container.style.display = 'none';
        }
        calcTotal();
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.sub-check:checked').forEach(cb => {
            total += parseInt(cb.dataset.price);
        });
        document.getElementById('totalAmount').innerText = total;
    }

    // ---------------------------------------------------------
    // 5. إرسال الطلب (تم تعديلها لإرسال المدينة)
    // ---------------------------------------------------------
    function sendOrder() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'جاري الإرسال...';

        // تجميع المواد المختارة
        let selectedSubjects = [];
        let totalPrice = 0;
        document.querySelectorAll('.sub-check:checked').forEach(cb => {
            selectedSubjects.push(cb.value);
            totalPrice += parseInt(cb.dataset.price);
        });

        if (selectedSubjects.length === 0) {
            alert('يرجى اختيار مادة واحدة على الأقل');
            btn.disabled = false;
            btn.innerText = '🚀 تأكيد الطلب';
            return;
        }

        // تجهيز البيانات للإرسال
        const orderData = {
            order_id: 'ORD-' + Date.now(),
            student_name: document.getElementById('studentName').innerText,
            telegram_id: document.getElementById('userId').innerText,
            city: userCity, // ✅ هنا يتم إرسال المحافظة التي تم جلبها
            stage: document.getElementById('stageSelect').options[document.getElementById('stageSelect').selectedIndex].text,
            grade: document.getElementById('gradeSelect').options[document.getElementById('gradeSelect').selectedIndex].text,
            subjects: selectedSubjects.join(' | '),
            count: selectedSubjects.length,
            total_amount: totalPrice,
            browser_fingerprint: fingerprint, // ✅ البصمة المحفوظة
            timestamp: new Date().toISOString()
        };

        // رابط السكربت (ضع رابطك هنا)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdd4PHSPNo19Q_31Z0PboTuZnqsG_AJdAfHjC5T8MhNQGXkYONQ4ZhxgQar-DCt-ir/exec';

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(orderData)
        })
        .then(response => response.text())
        .then(result => {
            tg.showAlert('✅ تم استلام طلبك بنجاح! سيتم مراجعة البيانات وإرسال الملفات.');
            tg.close();
        })
        .catch(error => {
            alert('حدث خطأ في الاتصال، حاول مرة أخرى');
            btn.disabled = false;
            btn.innerText = '🚀 تأكيد الطلب';
        });
    }
</script>

</body>
</html>
